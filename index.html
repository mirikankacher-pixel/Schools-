<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1bsef3 | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-abstract"></div>

    <div id="login-screen" class="screen active login-flex">
        <div class="login-card glass">
            <h1>1bsef3</h1>
            <p>Mehdi Ben Berka</p>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="auth-code" placeholder="Enter Access Code">
            </div>
            <p id="login-error" class="error-msg" style="display:none; color:red;">Invalid code.</p>
            <button onclick="app.login()" class="btn-primary">Enter</button>
        </div>
    </div>

    <div id="main-app" class="screen" style="display:none;">
        <header class="glass-header">
            <div class="header-info"><h2>1bsef3</h2></div>
            <div class="header-actions">
                <div class="welcome-text">Hi, <span id="user-name"></span></div>
                <div class="menu-container" style="position:relative;">
                    <button class="icon-btn" onclick="app.toggleMenu()">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                    <div class="dropdown-menu glass" id="dropdown" style="display:none; position:absolute; right:0; top:40px; width:180px; z-index:100;">
                        <div class="menu-item" onclick="app.navigate('schedule')">Schedule</div>
                        <div class="menu-item" onclick="app.navigate('exams')">Exams</div>
                        <div class="menu-item" onclick="app.navigate('homework')">Homework</div>
                        <div class="menu-item" onclick="app.navigate('teachers')">Absences</div>
                        <div class="menu-item admin-only" onclick="app.navigate('students')" style="display:none;">Students</div>
                        <hr>
                        <div class="menu-item" onclick="app.logout()" style="color:red;">Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div id="view-schedule" class="view">
                <table class="schedule-table glass"><tbody id="schedule-body"></tbody></table>
            </div>
            <div id="view-exams" class="view" style="display:none;">
                <div class="view-header"><h3>Exams</h3><button class="admin-only" onclick="app.addExam()">+ Add</button></div>
                <div id="exams-container"></div>
            </div>
            <div id="view-homework" class="view" style="display:none;">
                <div class="view-header"><h3>Homework</h3><button class="admin-only" onclick="app.addHomework()">+ Add</button></div>
                <div id="homework-container"></div>
            </div>
            <div id="view-teachers" class="view" style="display:none;">
                <div class="view-header"><h3>Absences</h3><button class="admin-only" onclick="app.addAbsence()">+ Add</button></div>
                <div id="teachers-container"></div>
            </div>
            <div id="view-students" class="view" style="display:none;">
                <div class="view-header"><h3>Students</h3><button onclick="app.addStudent()">+ New</button></div>
                <table class="schedule-table glass"><tbody id="student-list-body"></tbody></table>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
