<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1bsef3 | Mehdi Ben Berka</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-abstract"></div>

    <div id="login-screen" class="screen active login-flex">
        <div class="login-card glass">
            <h1>1bsef3</h1>
            <p>Mehdi Ben Berka</p>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="auth-code" placeholder="Enter Access Code">
            </div>
            <p id="login-error" class="error-msg">Invalid access code.</p>
            <button onclick="app.login()" class="btn-primary">Enter Dashboard</button>
        </div>
    </div>

    <div id="main-app" class="screen">
        <header class="glass-header">
            <div class="header-info">
                <h2>1bsef3</h2>
                <p>Mehdi Ben Berka</p>
            </div>
            <div class="header-actions">
                <div class="welcome-text">Hi, <span id="user-name"></span></div>
                <div class="menu-container">
                    <button class="icon-btn" onclick="app.toggleMenu()">
                        <i class="fas fa-ellipsis-v"></i>
                        <span class="notify-dot global-dot" id="global-notify"></span>
                    </button>
                    <div class="dropdown-menu glass" id="dropdown">
                        <div class="menu-item" onclick="app.navigate('schedule')">Schedule <span class="notify-dot" id="dot-schedule"></span></div>
                        <div class="menu-item" onclick="app.navigate('exams')">Exams <span class="notify-dot" id="dot-exams"></span></div>
                        <div class="menu-item" onclick="app.navigate('homework')">Homework <span class="notify-dot" id="dot-homework"></span></div>
                        <div class="menu-item" onclick="app.navigate('teachers')">Absences <span class="notify-dot" id="dot-teachers"></span></div>
                        <div class="menu-item admin-only" onclick="app.navigate('students')">Student Directory</div>
                        <hr>
                        <div class="menu-item text-red" onclick="app.logout()">Logout</div>
                    </div>
                </div>
            </div>
        </header>

        <div id="admin-panel" class="admin-bar glass hidden">
            <span><i class="fas fa-crown"></i> Admin Mode</span>
        </div>

        <main class="content-area">
            <div id="view-schedule" class="view hidden">
                <div class="view-header">
                    <h3>Week Schedule</h3>
                </div>
                <div class="table-responsive">
                    <table class="schedule-table glass">
                        <tbody id="schedule-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-exams" class="view hidden">
                <div class="view-header">
                    <h3>Exams</h3>
                    <button class="btn-outline admin-only" onclick="app.addExam()">+ Add Exam</button>
                </div>
                <div class="grid-cards" id="exams-container"></div>
            </div>

            <div id="view-homework" class="view hidden">
                <div class="view-header">
                    <h3>Homework</h3>
                    <button class="btn-outline admin-only" onclick="app.addHomework()">+ Add Homework</button>
                </div>
                <div class="grid-cards" id="homework-container"></div>
            </div>

            <div id="view-teachers" class="view hidden">
                <div class="view-header">
                    <h3>Teacher Absences</h3>
                    <button class="btn-outline admin-only" onclick="app.addAbsence()">+ Report</button>
                </div>
                <div class="grid-cards" id="teachers-container"></div>
            </div>

            <div id="view-students" class="view hidden">
                <div class="view-header">
                    <h3>Student Directory</h3>
                    <button class="btn-outline" onclick="app.addStudent()">+ New Student</button>
                </div>
                <div class="table-responsive">
                    <table class="schedule-table glass">
                        <thead>
                            <tr><th>Name</th><th>Code</th><th>Role</th><th>Last Login</th><th>Action</th></tr>
                        </thead>
                        <tbody id="student-list-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
